include: package:very_good_analysis/analysis_options.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "lib/generated/*"
    - "lib/l10n/*"
    - "lib/**/*.gr.dart"
    - "**/*.config.dart"
    - "**/*.gen.dart"
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # Treat missing required parameters as errors
    missing_required_param: error
    # Treat missing returns as errors
    missing_return: error

linter:
  rules:
    # Disable excessively strict rules from very_good_analysis
    public_member_api_docs: false
    lines_longer_than_80_chars: false
    
    # Fix import style conflict
    always_use_package_imports: false
    prefer_relative_imports: true

    # BLoC/Cubit specific rules
    close_sinks: true
    discarded_futures: true
    unawaited_futures: true
    use_build_context_synchronously: true

    # Optional but recommended additions for Flutter
    avoid_print: true
    prefer_single_quotes: true
    sort_pub_dependencies: true
    prefer_const_constructors: true
    prefer_const_declarations: true

