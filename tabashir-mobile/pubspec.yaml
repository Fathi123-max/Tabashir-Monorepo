name: tabashir
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^9.1.1

  # HTTP client
  dio: ^5.3.2
  retrofit: ^4.0.1

  # Navigation
  go_router: ^12.1.3

  # Dependency injection
  get_it: ^8.2.0
  injectable: ^2.3.2


  # Storage
  flutter_secure_storage: ^9.2.2

  # UI utilities
  flutter_screenutil: ^5.9.3
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  iconsax: ^0.0.8
  shimmer: ^3.0.0

  # Forms
  reactive_forms: ^18.0.0
  dropdown_search: ^6.0.2

  # File handling
  file_picker: ^8.1.2
  pdfx: ^2.6.1
  flutter_pdf_text:
    path: packages/flutter_pdf_text
  archive: ^3.4.10
  xml: ^6.5.0

  # Data persistence
  shared_preferences: ^2.2.3

  # Localization
  easy_localization: ^3.0.7

  # Notifications
  flutter_local_notifications: ^19.5.0
  # Firebase
  firebase_core: ^4.2.0
  firebase_crashlytics: ^5.0.3
  firebase_analytics: ^12.0.3
  firebase_auth: ^6.1.2
  freezed_annotation: ^3.1.0
  url_launcher: ^6.3.2
  image_picker: ^1.2.0
  firebase_messaging: ^16.0.3
  intl: ^0.20.2
  # OneSignal
  onesignal_flutter: ^5.2.1
  # Social Sign-in
  sign_in_with_apple: ^7.0.1
  google_sign_in: ^6.2.1
  flutter_dotenv: ^6.0.0

  # Stripe Payment
  flutter_stripe: ^12.1.0
  rename_app: ^1.6.5
  share_plus: ^12.0.1

  # Charts and Analytics
  fl_chart: ^0.66.0
  liquid_progress_indicator: ^0.4.0
  timelines: ^0.1.0
  device_info_plus: ^12.3.0
  flutter_svg: ^2.2.4
  in_app_purchase: ^3.2.3

dev_dependencies:
  flutter_en_json_extractor: ^0.0.5
  very_good_analysis: ^10.0.0
  build_runner: ^2.10.0
  freezed: ^3.2.3
  json_annotation: ^4.11.0
  json_serializable: ^6.8.0
  injectable_generator: ^2.4.1
  retrofit_generator: ^10.0.6
  mockito: ^5.4.5
  bloc_lint: ^0.3.2
  swagger_to_dart: ^4.0.0
  pretty_dio_logger: ^1.4.0
  flutter_test:
    sdk: flutter
  change_app_package_name: ^1.5.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/translations/
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo_light.png"
  background_color: "#0F4C81"
  adaptive_icon_background: "#0F4C81"
  adaptive_icon_foreground_image: "assets/images/logo_light.png"
  min_sdk_android: 21
  remove_alpha_ios: true
